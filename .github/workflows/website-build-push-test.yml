name: Website build, integration tests

on:
  workflow_call:
    inputs:
      debug:
        type: boolean
        default: false
      docker_image:
        type: string
        required: true
      site_host:
        type: string
        required: true
      push:
        type: boolean
        default: false
      ecr_registry:
        type: string
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
          use-cache: true
          hostname: gha-${{ github.run_id }}-${{ github.run_attempt }}
          args: --accept-dns

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v3
        with:
          context: .
          push: false
          build-args: |
            SITE=${{ inputs.site_host }}
          tags: ${{ inputs.docker_image }}

      - name: Route egress via DMZ exit node      # <-- BEFORE Boot docker image
        run: command -v tailscale >/dev/null && sudo tailscale set --exit-node= || true

      - name: Boot docker image
        run: |
          docker run --network host \
            --name website-${{ inputs.site_host }} \
            -e AB_PROJECTS_GRAPHQL_URL=https://graphql.ab-projects.parameter1.com \
            -e ACTIVE_CAMPAIGN_API_KEY=not-set \
            -e AUTH0_BASEURL=https://www.google.com \
            -e AUTH0_SECRET=12345678 \
            -e AVATAX_HASHED_CREDENTIALS=not-set \
            -e BRAZE_API_KEY=12345678 \
            -e EQUIPMENT_EXPERTS_GRAPHQL_URI=https://www.google.com \
            -e GLOBAL_50_250_DOCS_API_KEY=not-set \
            -e IDENTITYX_GRAPHQL_URI=https://apis.mindfulcms.com/graphql/idx-compat \
            -e MAILCHIMP_ACCESS_TOKEN=not-set \
            -e MARKO_WEB_DISABLE_STREAMING=true \
            -e MINDFUL_AD_SERVER_DATA_API_KEY=not-set \
            -e MINDFUL_EMAIL_API_KEY=not-set \
            -e OMEDA_APP_ID=not-set \
            -e OMEDA_INPUT_ID=not-set \
            -e PAYFABRIC_DEVICE_ID=not-set \
            -e PAYFABRIC_DEVICE_PWD=not-set \
            -e PAYFABRIC_GATEWAY_NAME=not-set \
            -e POSTUP_API_CREDENTIALS=not-set \
            -e RECAPTCHA_V3_SECRET_KEY=not-set \
            -e RECAPTCHA_V3_SITE_KEY=not-set \
            -e RIGDIG_PASSWORD=not-set \
            -e RIGDIG_USERNAME=not-set \
            -e SENDGRID_API_KEY=not-set \
            -e SENDGRID_DEV_TO=no-reply@parameter1.com \
            -e SPEC_GUIDE_DOCS_API_KEY=not-set \
            -e ZERO_BOUNCE_API_KEY=not-set \
            ${{ inputs.docker_image }} &

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - uses: actions/cache@v3
        id: yarn-cache
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

      - name: Install dependencies
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile

      - name: Run integration tests
        env:
          DEBUG: ${{ case(inputs.debug, 'marko-web', '') }}
        run: |
          echo "egress IP: $(curl -s https://ifconfig.me)"   # must be the whitelisted DMZ NAT IP
          node ./test/integration.js
        timeout-minutes: 3

      - name: Disable exit node
        if: always()
        run: sudo tailscale set --exit-node=

      - name: Stop docker image
        run: docker stop website-${{ inputs.site_host }}

      - name: Export logs
        if: failure()
        run: docker logs -t website-${{ inputs.site_host }}

      - name: Log in to ECR
        if: inputs.push
        uses: docker/login-action@v2
        with:
          registry: ${{ inputs.ecr_registry }}
          username: ${{ secrets.AWS_ACCESS_KEY_ID }}
          password: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - uses: docker/build-push-action@v3
        if: inputs.push
        with:
          context: .
          push: true
          build-args: |
            SITE=${{ inputs.site_host }}
          tags: ${{ inputs.docker_image }}
